<script type="text/babel">
/* ================================================================
   NUTRITIMER — MEAL TIMING DASHBOARD
   ================================================================
   PURPOSE:
   Real-time dashboard that tells the user exactly what to eat and when,
   based on their workout schedule for the day. Designed for maximum
   simplicity — ONE protein, ONE carb, ONE green, plus eggs and banana.

   USER PROFILE (as of March 2026):
   - 30M, 169cm, 75.3kg (down from 80.2kg on Feb 17)
   - Body fat: ~23.2% → goal 15% (~68kg target weight)
   - Recomp in progress: muscle +2.3%, fat -2.4% over last quarter
   - Rate of loss: ~0.8 kg/week target (safe for muscle preservation)
   - Lean mass flagged "Low" — must protect with high protein + training

   CORE PRINCIPLES:
   1. Carbs BEFORE the gym — red lentil pasta in all pre-gym meals.
      User learned the hard way that training on empty glycogen = bad.
   2. Chicken thighs provide BOTH protein (19.5g/100g) AND fat (6.2g/100g)
      in every meal — no need for separate fat sources or olive oil.
   3. No breakfast — morning is for fasted 10K steps (fat oxidation
      at peak during low-intensity fasted cardio). First meal at 08:30+.
   4. Rest days default to Sun/Thu (auto-detected). Manual override toggle
      available for days when gym isn't possible (sailing, travel, etc.).
      Override is date-scoped in localStorage — auto-expires at midnight.
   5. Post-gym / last meal adds 1 egg for extra fat to hit daily target.

   CALORIE TARGETS (revised Apr 2026 for 73.8kg, aggressive recomp):
   - Workout days: ~1,510 kcal — 172P / 115C / 39F (THIGH mode)
                   ~1,550 kcal — 180P / 115C / 32F (BREAST mode, +eggs)
   - Rest days:    ~1,210 kcal — 167P /  63C / 38F (THIGH mode)
                   ~1,260 kcal — 175P /  63C / 32F (BREAST mode, +eggs)
   - Weekly avg:   ~1,390 kcal/day (4 workout + 3 rest)
   - TDEE est.     ~2,350 → deficit ~960/day → ~0.85 kg/week loss
   - Protein toggle: defaults to thigh (fattier, simpler). Breast mode
     swaps 120g thigh → 100g breast + 1 egg per meal to match macros.

   FOOD SOURCING — Tesco Dun Laoghaire, Ireland (minimal shopping list):
   ┌──────────────────────────────────────────────────────────────────┐
   │  ITEM                          │ DEAL              │ WEEKLY     │
   │  Chicken boneless thighs 420g  │ 3 for €10 CC      │ ~€33.50   │
   │  Red lentil pasta 250g         │ €1.50/bag          │ ~€4.50    │
   │  Broccoli                      │ —                  │ ~€3-4     │
   │  Eggs (dozen)                  │ —                  │ ~€3       │
   │  Bananas                       │ —                  │ ~€1       │
   │                                │ TOTAL              │ ~€45-50   │
   └──────────────────────────────────────────────────────────────────┘

   CHICKEN THIGHS NUTRITION (Tesco Irish boneless skinless, per 100g):
   134 kcal · 19.5g protein · 6.2g fat (1.8g sat) · 0g carb

   RED LENTIL PASTA NUTRITION (Tesco High Protein fusilli, per 100g cooked):
   186 kcal · 12.3g protein · 0.7g fat · 31.1g carb · 3.2g fibre
   (75g dry ≈ 170g cooked. Gluten free. Source of fibre.)

   SUPPLEMENT NOTES (bought in-store, not tracked as separate events):
   - ON Pre-Workout (contains 3.4g creatine) — take 30min before gym
   - Creatine 5g standalone — rest days only (pre-workout covers gym days)
   - Omega-3 (Seven Seas Max Strength) — take with any meal (fat present)
   - ON Electrolyte Powder — sip during gym (~5g carbs, count toward total)
   - Plenny Pro (Jimmy Joy) — 40g protein, 400kcal meal replacement for on-the-go

   WORKOUT PRESETS:
   User taps to select gym time. Fixed meal times: 08:30, 12:30, 16:30, 20:30.
   Only exception: morning gym shifts meal 1 to 10:00 (you're in the gym at 08:30).
   - MORNING (08:00): Banana pre-gym, all pasta meals post-workout
   - MIDDAY  (14:00): 2 pasta meals before, 1 after, best carb balance
   - EVENING (18:00): 3 pasta meals before gym, maximum fuel (default)

   WHY CHICKEN THIGHS AS SOLE PROTEIN:
   - Provides both protein AND fat in one food — no olive oil, no beef, no second protein
   - 3-for-€10 Clubcard deal on 420g packs — cheapest protein per gram on deal
   - 6.2g fat/100g is moderate: enough for hormones, not enough to wreck
     pre-workout gastric emptying (~7.4g fat in a 120g serving)
   - Simplest possible plan: user buys ONE protein source

   WHY RED LENTIL PASTA OVER BULGUR/POTATO:
   - 12.3g protein per 100g cooked — highest protein carb, stacks with chicken
   - Gluten free, good fibre (3.2g/100g)
   - €1.50/250g dry bag — cheap and shelf-stable
   - Lower GI than potato — sustained energy, no crash mid-workout

   PORTIONS — identical per meal for easy Cronometer tracking:
   - Workout day: 120g chicken × 4 meals, 110g cooked pasta × 3 carb meals,
     80g broccoli × 4 meals, 1 banana (pre-gym), 1 egg (last meal)
   - Rest day: 175g chicken × 4 meals, 100g cooked pasta × 1 meal,
     80g broccoli × 4 meals, 1 egg × 2 meals (meal 2 + meal 4)

   MEAL TIMES — fixed at 08:30, 12:30, 16:30, 20:30 every day.
   Only exception: morning gym (08:00) shifts meal 1 to 10:00
   because you're literally in the gym at 08:30.

   MACRO VERIFICATION (workout day — from Cronometer):
   480g chicken (120g × 4): 643.2 kcal
   330g cooked pasta (110g × 3): 615.3 kcal
   400g broccoli (100g × 4): 162.4 kcal
   1 banana: 103.8 kcal
   1 egg: 77.5 kcal
   ON Pre-Workout: 32.0 kcal
   Whey protein 2 scoops (optional): 110.1 kcal
   TOTAL: 1744.3 kcal · 179.5P / 143C / 41.6F ✓
   (vs target 1750 kcal · 178P / 161C / 46F)

   MACRO VERIFICATION (rest day):
   700g chicken: 136.5P, 43.4F, 0C = 938 kcal
   100g cooked pasta: 12.3P, 0.7F, 31.1C = 186 kcal
   400g broccoli (100g × 4): 11.2P, 1.6F, 28C = 136 kcal
   2 eggs: 12.6P, 9.6F, 0.8C = 144 kcal
   TOTAL: 172.6P, 55.3F, 59.9C = ~1,404 kcal ✓
   ================================================================ */

const { useState, useEffect, useCallback, useRef } = React;

/* ----------------------------------------------------------------
   CONSTANTS
   ---------------------------------------------------------------- */
const DAY_NAMES   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const padZ = (n) => String(n).padStart(2, "0");
const toMin = (t) => { const [h,m] = t.split(":").map(Number); return h * 60 + m; };

const DAY_START = 6 * 60;
const DAY_END   = 23 * 60;

const TYPE_COLORS = {
  meal: "#4ade80",
  fuel: "#fb923c",
  gym:  "#60a5fa",
};

/* ----------------------------------------------------------------
   FOOD NUTRITION DATABASE
   ----------------------------------------------------------------
   All values per 100g unless otherwise noted. Sourced from Tesco
   labels + Cronometer. Used for dynamic macro computation across
   the whole day — when the user toggles breast/thigh or switches
   between rest/workout/preset, the footer totals update live.
   ---------------------------------------------------------------- */
const FOODS = {
  breast:   { kcal: 110,  p: 24.7, c: 0.1,  f: 1.18 },  // per 100g raw (user's custom Cronometer entry)
  tuna:     { kcal: 101,  p: 23,   c: 0,    f: 1    },  // skipjack chunks in brine, per 100g drained
  pasta:    { kcal: 186,  p: 12.3, c: 31.1, f: 0.7 },   // per 100g cooked
  broccoli: { kcal: 40.6, p: 2.8,  c: 7,    f: 0.4 },   // per 100g
  egg:      { kcal: 77.5, p: 6.3,  c: 0.4,  f: 4.8 },   // per 1 large egg (unit)
  banana:   { kcal: 105,  p: 1.3,  c: 27,   f: 0.4 },   // per 1 medium (unit)
  whey:     { kcal: 110,  p: 24,   c: 3,    f: 2   },   // per 2 scoops (serving)
  preWO:    { kcal: 5,    p: 0,    c: 0,    f: 0   },   // Body Fuel stim-free, per scoop (negligible)
};

/* Tuna tin: 56g drained */
const TUNA_DRAINED_G = 56;

/* Chicken breast portion. Raw 90g shrinks to ~68g cooked. */
const BREAST = {
  rawG: 90,
  cookedG: 68,
  label: "68g chicken breast (cooked)",
};

/* Determine which meals get eggs.
   Rule: FIRST meal-type gets 2 eggs, LAST meal-type gets 4 eggs.
   This concentrates more fat in the last meal for overnight MPS
   and keeps the first meal lighter for a faster return to the
   fat-burning trough between meals 1 and 2. Total 6 eggs/day. */
const getMealEggs = (events, eventId) => {
  const meals = events.filter(e => e.type === "meal");
  if (meals.length === 0) return 0;
  const firstId = meals[0].id;
  const lastId = meals[meals.length - 1].id;
  if (eventId === lastId) return 4;
  if (eventId === firstId) return 2;
  return 0;
};

/* Transform a meal's items list:
   1. Swap the chicken line to either the breast portion label OR tuna
      (if the meal is flagged as a tuna meal)
   2. Strip any existing egg lines (templates may have legacy eggs)
   3. If this meal is flagged for eggs, append the right number of eggs */
const transformMealItems = (items, eggCount, useTuna) => {
  let out = [];
  let proteinSwapped = false;
  for (const item of items) {
    if (/chicken|tuna/i.test(item) && !proteinSwapped) {
      out.push(useTuna ? `1 tin skipjack tuna in brine (${TUNA_DRAINED_G}g drained)` : BREAST.label);
      proteinSwapped = true;
    } else if (/whole egg/i.test(item)) {
      continue;
    } else {
      out.push(item);
    }
  }
  if (eggCount > 0) {
    out.push(eggCount === 1 ? "1 whole egg" : `${eggCount} whole eggs`);
  }
  return out;
};

/* Compute macros for a single meal's transformed item list. */
const computeItemsMacros = (items) => {
  let kcal = 0, p = 0, c = 0, f = 0;
  const addFood = (key, grams) => {
    kcal += FOODS[key].kcal * grams / 100;
    p    += FOODS[key].p    * grams / 100;
    c    += FOODS[key].c    * grams / 100;
    f    += FOODS[key].f    * grams / 100;
  };
  const addUnit = (key, units) => {
    kcal += FOODS[key].kcal * units;
    p    += FOODS[key].p    * units;
    c    += FOODS[key].c    * units;
    f    += FOODS[key].f    * units;
  };
  items.forEach(line => {
    if (/tuna/i.test(line)) {
      addFood("tuna", TUNA_DRAINED_G);
    } else if (/chicken/i.test(line)) {
      addFood("breast", BREAST.rawG);
    } else if (/pasta/i.test(line)) {
      const m = line.match(/(\d+)g/);
      if (m) addFood("pasta", parseInt(m[1]));
    } else if (/broccoli/i.test(line)) {
      const m = line.match(/(\d+)g/);
      if (m) addFood("broccoli", parseInt(m[1]));
    } else if (/whole egg/i.test(line)) {
      const m = line.match(/^(\d+)/);
      addUnit("egg", m ? parseInt(m[1]) : 1);
    } else if (/banana/i.test(line)) {
      addUnit("banana", 1);
    } else if (/whey/i.test(line) && !/optional/i.test(line)) {
      addUnit("whey", 1);
    } else if (/pre-?workout|body fuel/i.test(line)) {
      addUnit("preWO", 1);
    }
  });
  return {
    kcal: Math.round(kcal),
    p: Math.round(p * 10) / 10,
    c: Math.round(c * 10) / 10,
    f: Math.round(f * 10) / 10,
  };
};

/* Compute total macros for a day given its event list. */
const computeDayMacros = (events) => {
  let kcal = 0, p = 0, c = 0, f = 0;
  events.forEach(ev => {
    if (ev.type !== "meal" && ev.type !== "fuel") return;
    const eggs = ev.type === "meal" ? getMealEggs(events, ev.id) : 0;
    const items = transformMealItems(ev.items, eggs, ev.useTuna);
    const m = computeItemsMacros(items);
    kcal += m.kcal; p += m.p; c += m.c; f += m.f;
  });
  return {
    kcal: Math.round(kcal),
    p: Math.round(p),
    c: Math.round(c),
    f: Math.round(f),
  };
};

/* Plenny Pro — swaps any meal when user taps the button */
const PLENNY_PRO = {
  label: "PLENNY PRO",
  tag: "MEAL REPLACEMENT",
  items: ["1 serving Plenny Pro shake", "Mix with 400ml cold water"],
  note: "Jimmy Joy Plenny Pro — 40g protein, 400kcal. Use when you're on the go and can't prep a real meal. Log in Cronometer and adjust remaining meals if needed.",
  supplements: [],
};

/* ----------------------------------------------------------------
   MEAL TEMPLATES
   ----------------------------------------------------------------
   Every meal is built from the same 5 ingredients:
   chicken thighs, red lentil pasta, broccoli, eggs, banana.

   Meals differ only in whether they include pasta (carb meals)
   and/or egg (fat-boosting meals). This is the simplicity:
   one protein source, one carb source, one green.

   The `id` field must be unique across all events in a preset
   so that Plenny Pro swaps work correctly per-meal.
   ---------------------------------------------------------------- */

/* Carb + Protein meal — chicken + pasta + broccoli.
   Used in pre-gym slots where glycogen loading matters.
   110g cooked pasta per meal across 3 carb meals. */
const MEAL_CARB = {
  id: "carb", label: "MEAL", type: "meal",
  tag: "CARB + PROTEIN",
  items: [
    "chicken breast",
    "70g red lentil pasta",
    "80g broccoli",
  ],
  note: "Chicken provides protein + fat naturally. Lentil pasta adds protein and carbs. Fat from chicken is moderate enough to not slow gastric emptying significantly.",
  supplements: [],
};

/* Pre-gym meal — 1 tin tuna + 1 egg + pasta + broccoli, 90 minutes
   before training. Tuna digests ~20% faster than chicken breast and
   delivers a cleaner amino acid spike with less gastric load heading
   into the gym. The egg compensates for tuna's lower protein and adds
   a small amount of fat for satiety. Banana + pre-workout is a SEPARATE
   event 30 min later (60 min before gym). Mercury: 1 tin/workout day × 4
   workout days = 4 tins/week, at the EFSA safe limit for skipjack. */
const MEAL_PRE_GYM = {
  id: "pre-gym", label: "MEAL", type: "meal",
  tag: "PRE-GYM · TUNA + CARBS",
  useTuna: true,
  items: [
    "tuna",
    "1 whole egg",
    "70g red lentil pasta",
    "80g broccoli",
  ],
  note: "Tuna digests ~20% faster than chicken and leaves less in your stomach going into the gym. Egg compensates for tuna's slightly lower protein. Pasta tops off muscle glycogen. Eat 90 min before training. Banana + pre-workout follows 30 min later (60 min before gym). 1 tin only — mercury limit is 4 tins/week.",
  supplements: [],
};

/* No-carb meal — chicken + broccoli only.
   Used in post-gym or late-day slots where low insulin is preferred.
   On workout days, chicken's built-in fat (6.2g/100g) covers fat needs
   without adding external fat sources. */
const MEAL_NOCARB = {
  id: "nocarb", label: "MEAL", type: "meal",
  tag: "PROTEIN + FAT · NO CARBS",
  items: [
    "chicken breast",
    "80g broccoli",
  ],
  note: "No carbs = low insulin = fat oxidation mode. Chicken's 6.2g fat per 100g provides fat naturally — no olive oil needed. Simple.",
  supplements: [],
};

/* Last meal of the day — chicken + egg + broccoli.
   The egg adds 4.8g fat to push daily fat total above the 40g hormone floor.
   Placed as the final meal for slow overnight protein delivery. */
const MEAL_LAST = {
  id: "last", label: "MEAL", type: "meal",
  tag: "PROTEIN + FAT · LAST MEAL",
  items: [
    "chicken breast",
    "80g broccoli",
    "Whey protein shake — 2 scoops",
  ],
  note: "Last meal of the day. 4 eggs (added by the meal transform) push fat above the hormone floor and extend overnight protein delivery. Whey gives a fast amino spike. Low insulin going into sleep maximises overnight GH release and fat oxidation. Chicken + eggs = slow-digesting protein feeds muscles overnight.",
  supplements: ["Omega-3 — 1 capsule (fat present aids absorption)"],
};

/* Pre-gym fuel — banana only. Used for morning gym when there's no time
   for a full meal. NOT a real meal — just quick glucose. */
const MEAL_FUEL = {
  id: "fuel", label: "PRE-GYM FUEL", type: "fuel",
  tag: "FAST CARBS",
  items: [
    "1 banana",
  ],
  note: "Minimal digestion time — banana glucose peaks in ~20min. This is NOT a full meal. Take your pre-workout at 07:30. Morning gym means no fasted walk today — the gym IS the exercise.",
  supplements: ["ON Pre-Workout — take at 07:30"],
};

/* Banana + pre-workout — sits 40 minutes before the gym session.
   Stim-free pre-workout (Applied Nutrition Body Fuel: 8g citrulline,
   3.2g beta-alanine, no caffeine). Without caffeine, the 60-min timing
   isn't required — citrulline peaks at ~60 min, banana glucose at ~30
   min, so 40 min splits the difference. */
const BANANA_FUEL = {
  id: "banana-fuel", label: "BANANA + PRE", type: "fuel",
  tag: "40 MIN BEFORE GYM",
  items: [
    "1 banana",
    "1 scoop Body Fuel (stim-free)",
  ],
  note: "Take ~40 min before training. Banana glucose peaks ~30 min then is absorbed into muscle glycogen. Citrulline (8g) peaks at the start of training and increases blood flow + reduces perceived exertion. No caffeine = no sleep impact at 22:30 bedtime, no cortisol spike on top of on-call stress.",
  supplements: [],
};

/* Gym event — same across all presets, just different time slots */
const makeGym = (carbMeals) => ({
  type: "gym", id: "gym", label: "GYM", tag: "TRAINING",
  items: [
    "Resistance training session",
    "Sip ON Electrolytes throughout (~5g carbs)",
  ],
  note: `${carbMeals} carb meal${carbMeals !== 1 ? 's' : ''} digested — glycogen ${carbMeals >= 2 ? 'is loaded' : 'from last night + banana fuel'}. Catecholamines suppress insulin ~40-60%, GLUT4 drives glucose uptake independently.`,
  supplements: ["ON Electrolyte Powder — sip throughout"],
});

/* ----------------------------------------------------------------
   WORKOUT PRESETS
   ----------------------------------------------------------------
   Each preset arranges the same food across different time slots
   depending on when the gym session happens. The KEY CONSTRAINT:
   carb (pasta) meals go BEFORE the gym for glycogen loading.
   Post-gym / evening meals are no-carb (chicken + broccoli only).

   All presets total 480g chicken (120g × 4), 330g cooked pasta (110g × 3),
   400g broccoli (100g × 4), 1 banana, 1 egg = ~1,744 kcal.

   The egg always goes in the LAST meal of the day.
   ---------------------------------------------------------------- */

const PRESETS = {
  afternoon: {
    id: "afternoon",
    label: "AFTERNOON",
    gymTime: "15:15",
    desc: "Gym at 15:15 · On-call friendly · Eat at desk",
    /* Afternoon is designed for on-call days where the user can't leave
       the laptop until 15:00. Meal 2 shifts to 11:30 so meal 3 can fit
       at 13:45 (90 min before gym). Banana + Body Fuel at 14:35 (40 min
       before gym, since pre-workout is now stim-free). Gym 15:15. Meal 4
       at 20:30 gives a solid 5h post-workout window for adrenergic settle
       and protein redistribution before sleep. */
    events: [
      { ...MEAL_CARB,    time: "08:30", endTime: "11:30", id: "carb-1", label: "MEAL 1" },
      { ...MEAL_CARB,    time: "11:30", endTime: "13:45", id: "carb-2", label: "MEAL 2" },
      { ...MEAL_PRE_GYM, time: "13:45", endTime: "14:35", label: "MEAL 3" },
      { ...BANANA_FUEL,  time: "14:35", endTime: "15:15" },
      { ...makeGym(3),   time: "15:15", endTime: "16:35" },
      { ...MEAL_LAST,    time: "20:30", endTime: "22:30", label: "MEAL 4",
        tag: "POST-WORKOUT · PROTEIN + FAT",
        note: "5 hours after gym — adrenergic state has fully settled, muscles have been in recovery mode all afternoon. Chicken + eggs + whey provides protein for overnight recovery. Eggs push fat above the hormone floor. No carbs — you had plenty pre-gym. Sleep by 22:30 for GH release." },
    ],
  },

  evening: {
    id: "evening",
    label: "EVENING",
    gymTime: "18:00",
    desc: "Gym at 18:00 · Saturday only · Chicken pre-gym",
    /* Evening preset is for Saturday — the 5th training day of the week.
       Tuna is capped at 4 tins/week (Mon-Fri) due to mercury, so Saturday
       uses chicken breast in the pre-gym meal. Banana + Body Fuel at 17:20
       (40 min before gym, stim-free pre-workout). */
    events: [
      { ...MEAL_CARB,    time: "08:30", endTime: "12:30", id: "carb-1", label: "MEAL 1" },
      { ...MEAL_CARB,    time: "12:30", endTime: "16:30", id: "carb-2", label: "MEAL 2" },
      { ...MEAL_PRE_GYM, time: "16:30", endTime: "17:20", label: "MEAL 3", useTuna: false,
        tag: "PRE-GYM · CHICKEN + CARBS",
        items: ["chicken", "70g red lentil pasta", "80g broccoli"],
        note: "Saturday uses chicken instead of tuna (mercury cap: 4 tins/week, used Mon-Fri). 90g chicken provides ~22g protein, slightly more than the 1 tin tuna + egg combo. Pasta tops off muscle glycogen. Eat 90 min before training." },
      { ...BANANA_FUEL,  time: "17:20", endTime: "18:00" },
      { ...makeGym(3),   time: "18:00", endTime: "19:30" },
      { ...MEAL_LAST,    time: "20:30", endTime: "22:30", label: "MEAL 4",
        tag: "POST-WORKOUT · PROTEIN + FAT",
        note: "Post-workout GLUT4 still elevated. Chicken + eggs + whey provides protein for overnight recovery. Eggs push fat above the hormone floor. No carbs — you've had plenty already today. Sleep by 22:30 for GH release." },
    ],
  },
};

/* ----------------------------------------------------------------
   REST DAY MEALS
   ----------------------------------------------------------------
   Only the FIRST meal includes pasta (small portion: ~100g cooked /
   ~44g dry). Remaining meals are chicken + broccoli +/- eggs.
   This keeps insulin low for 12+ hours, maximising fat oxidation
   on the days you're not training.

   Total: 700g chicken, 100g cooked pasta, 400g broccoli, 2 eggs
   = ~1,370 kcal · 170P / 55F / 52C

   Auto-triggered on Sunday (0) and Thursday (4).
   Can be manually overridden via the tappable day-type badge.
   ---------------------------------------------------------------- */
const REST_EVENTS = [
  {
    id: "rest-1", label: "MEAL 1", type: "meal",
    tag: "LAST CARB MEAL TODAY",
    time: "08:30", endTime: "12:30",
    items: [
      "chicken breast",
      "70g red lentil pasta",
      "80g broccoli",
    ],
    note: "Last starch of the day. Only ~31g carbs — just enough to keep thyroid and metabolism responsive. No carbs after this on rest days. Afternoon insulin stays low, maximising fat oxidation for 12+ hours.",
    supplements: [],
  },

/* ----------------------------------------------------------------
   REST DAY DETECTION + OVERRIDE
   ----------------------------------------------------------------
   Auto: Sunday (0) and Thursday (4).
   Override: tappable badge stores today's date in localStorage.
   Auto-expires at midnight — no stale overrides carrying forward.
   ---------------------------------------------------------------- */
const isAutoRestDay = (d) => d.getDay() === 0 || d.getDay() === 4;

/* Training split by day of week.
   Mon=Push, Tue=Pull, Wed=Legs, Thu=Rest, Fri=Upper, Sat=Lower, Sun=Rest.
   Matches on-call schedule: Mon-Fri afternoon preset, Sat evening preset. */
const TRAINING_SPLIT = {
  0: null,      // Sunday — rest
  1: "PUSH",    // Monday
  2: "PULL",    // Tuesday
  3: "LEGS",    // Wednesday
  4: null,      // Thursday — rest
  5: "UPPER",   // Friday
  6: "LOWER",   // Saturday
};
const SPLIT_ORDER = [1, 2, 3, 5, 6]; // Mon, Tue, Wed, Fri, Sat
const getTrainingDayIndex = (d) => {
  const day = d.getDay();
  const idx = SPLIT_ORDER.indexOf(day);
  return idx; // -1 if rest day
};
const getWeeklyProgress = (d) => {
  // How many training days have already passed this week (including today if it's a training day)
  const day = d.getDay();
  // Week starts Monday. Count training days up to and including today.
  let done = 0;
  for (const sd of SPLIT_ORDER) {
    // Monday=1..Sun=0. Convert Sunday(0) to 7 for week ordering.
    const todayOrder = day === 0 ? 7 : day;
    const sdOrder = sd === 0 ? 7 : sd;
    if (sdOrder <= todayOrder) done++;
  }
  return { done, total: SPLIT_ORDER.length };
};
const todayKey = (d) => `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`;

const loadRestOverride = () => {
  try {
    const stored = JSON.parse(localStorage.getItem("nutritimer-rest-override") || "{}");
    if (stored.date === todayKey(new Date())) return stored.value;
    return null;
  } catch { return null; }
};
const saveRestOverride = (value) => {
  try {
    localStorage.setItem("nutritimer-rest-override", JSON.stringify({ date: todayKey(new Date()), value }));
  } catch {}
};
const clearRestOverride = () => {
  try { localStorage.removeItem("nutritimer-rest-override"); } catch {}
};

const formatCountdown = (diffMs) => {
  if (diffMs <= 0) return "NOW";
  const totalSec = Math.floor(diffMs / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${padZ(m)}m`;
  if (m > 0) return `${m}m ${padZ(s)}s`;
  return `${s}s`;
};

/* ================================================================
   PHYSIOLOGY CHART COMPONENT
   ================================================================
   Generates insulin / glucose / glycogen / fat-ox / amino / GH /
   cortisol / caffeine curves from the current day's events. The
   shape of every curve shifts with the meal times and gym slot,
   so when the user changes preset (morning/midday/evening) or
   toggles rest day, the physiological response updates live.

   Values are normalised to 0-100 (relative % of daily range) so
   they can share a single Y axis without one line dwarfing another.
   ================================================================ */

/* Gaussian bell helper: peak `h` at centre `c`, width `w` */
const bell = (x, c, h, w) => h * Math.exp(-((x - c) * (x - c)) / (2 * w * w));

function generatePhysiology(events, rest) {
  const startMin = 6 * 60;
  const endMin = 24 * 60 + 30;
  const step = 15;
  const points = [];
  for (let t = startMin; t <= endMin; t += step) points.push(t);

  const insulin   = points.map(() => 5);
  const glucose   = points.map(() => 28);
  const fatOx     = points.map(() => 80);
  const amino     = points.map(() => 15);
  const gh        = points.map(() => 8);
  const cortisol  = points.map(() => 0);
  const caffeine  = points.map(() => 0);
  const glycogen  = [];

  /* Cortisol awakening response + circadian decline.
     Peak ~7:30, then exponential decline through the day. */
  points.forEach((t, i) => {
    const hrsFromWake = (t - 7 * 60) / 60;
    if (hrsFromWake < 0) {
      cortisol[i] = Math.max(30, 90 + hrsFromWake * 20);
    } else {
      cortisol[i] = Math.max(4, 95 * Math.exp(-hrsFromWake / 4.5));
    }
  });

  /* For each meal, bolt on insulin + glucose + amino contributions. */
  events.forEach(ev => {
    if (ev.type !== "meal" && ev.type !== "fuel") return;
    const mealT = toMin(ev.time);
    const itemStr = ev.items.join(" ").toLowerCase();
    const hasCarbs = /pasta|banana/.test(itemStr);
    const hasFastCarbs = /banana/.test(itemStr) && !/pasta/.test(itemStr);
    const peak = hasFastCarbs ? 70 : hasCarbs ? 62 : 24;
    const peakOffset = hasFastCarbs ? 25 : 40;
    const width = hasFastCarbs ? 28 : 42;

    points.forEach((t, i) => {
      const dt = t - mealT;
      if (dt >= -20 && dt <= 200) {
        insulin[i] = Math.max(insulin[i], 5 + bell(dt, peakOffset, peak - 5, width));
        glucose[i] = Math.max(glucose[i], 28 + bell(dt, peakOffset - 5, (peak - 5) * 0.75, width));
      }
      if (dt >= 0 && dt <= 260) {
        amino[i] = Math.max(amino[i], 15 + bell(dt, 95, 55, 65));
      }
    });
  });

  /* Fat oxidation inversely tracks insulin. High baseline when
     insulin is at floor, drops during insulin spikes. */
  points.forEach((t, i) => {
    fatOx[i] = Math.max(10, 85 - (insulin[i] - 5) * 1.15);
  });

  /* Glycogen walk-through:
     - Starts ~68% after overnight decline
     - Drops slightly during fasted morning walk
     - Rises with each carb meal (pasta/banana)
     - Plummets during gym
     - Slowly restocks from later carb meals */
  let glyc = 68;
  const firstMealMin = events.find(e => e.type === "meal") ? toMin(events.find(e => e.type === "meal").time) : 8 * 60;
  const gymEv = events.find(e => e.type === "gym");
  const gymStart = gymEv ? toMin(gymEv.time) : null;
  const gymEnd = gymEv ? toMin(gymEv.endTime) : null;

  points.forEach((t, i) => {
    // Fasted walk: small glycogen draw
    if (!rest && t >= 7 * 60 && t < firstMealMin) glyc -= 0.25;
    // Carb meal: replenish, with a 30-min lag
    events.forEach(ev => {
      if (ev.type !== "meal" && ev.type !== "fuel") return;
      const mt = toMin(ev.time);
      const itemStr = ev.items.join(" ").toLowerCase();
      if (/pasta|banana/.test(itemStr) && t >= mt + 30 && t < mt + 150) {
        glyc += /banana.*pasta|pasta.*banana/.test(itemStr) ? 0.9 : 0.55;
      }
    });
    // Gym: rapid depletion
    if (gymStart && t >= gymStart && t <= gymEnd) glyc -= 3.2;
    // Clamp
    glyc = Math.max(30, Math.min(98, glyc));
    glycogen.push(glyc);
  });

  /* Caffeine: only exists on workout days, ingested 30 min pre-gym.
     Rise + decay kinetics: sharp rise over ~45 min, slow exponential decay. */
  if (gymStart && !rest) {
    const ingestT = gymStart - 30;
    points.forEach((t, i) => {
      const dt = t - ingestT;
      if (dt < 0) return;
      caffeine[i] = 88 * (1 - Math.exp(-dt / 22)) * Math.exp(-dt / 340);
    });
  }

  /* Growth hormone:
     - Small pulses during day when insulin is low
     - Big spike during training (between-set anaerobic stress)
     - Largest pulse 30-90 min into sleep (22:30 → 02:00) */
  points.forEach((t, i) => {
    // Suppressed by insulin
    if (insulin[i] > 20) gh[i] = Math.max(gh[i], 5);
    // Sleep pulse
    if (t >= 22 * 60 + 30) {
      const minsAsleep = t - (22 * 60 + 30);
      gh[i] = Math.max(gh[i], 15 + bell(minsAsleep, 70, 75, 45));
    }
  });
  if (gymStart) {
    points.forEach((t, i) => {
      if (t >= gymStart && t <= gymEnd + 30) {
        gh[i] = Math.max(gh[i], bell(t - gymStart, 45, 58, 30));
      }
    });
  }

  const clamp = arr => arr.map(v => Math.max(0, Math.min(100, Math.round(v))));
  const labels = points.map(t => `${padZ(Math.floor(t / 60) % 24)}:${padZ(t % 60)}`);

  return {
    labels, points,
    insulin:  clamp(insulin),
    glucose:  clamp(glucose),
    glycogen: clamp(glycogen),
    fatOx:    clamp(fatOx),
    amino:    clamp(amino),
    gh:       clamp(gh),
    cortisol: clamp(cortisol),
    caffeine: clamp(caffeine),
  };
}

const SERIES = [
  { key: "insulin",  label: "Insulin",         color: "#ef4444" },
  { key: "glucose",  label: "Blood glucose",   color: "#f59e0b" },
  { key: "glycogen", label: "Muscle glycogen", color: "#3b82f6" },

function PhysiologyChart({ events, rest, preset }) {
  const [expanded, setExpanded] = useState(false);
  const [active, setActive] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem("nutritimer-phys-active") || "null");
      if (stored) return stored;
    } catch {}
    return { insulin: true, glucose: true, glycogen: true, fatOx: true, amino: false, gh: true, cortisol: true };
  });
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const wrapRef = useRef(null);

  const toggle = (key) => {
    setActive(prev => {
      const next = { ...prev, [key]: !prev[key] };
      try { localStorage.setItem("nutritimer-phys-active", JSON.stringify(next)); } catch {}
      return next;
    });
  };

  useEffect(() => {
    if (!expanded) return;
    if (!canvasRef.current || !window.Chart) return;

    const phys = generatePhysiology(events, rest);

    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const datasets = SERIES.filter(s => active[s.key]).map(s => ({
      label: s.label,
      data: phys[s.key],
      borderColor: s.color,
      backgroundColor: s.color + "14",
      borderWidth: 1.8,
      pointRadius: 0,
      pointHitRadius: 10,
      tension: 0.38,
      fill: false,
    }));

    // Vertical line annotations for each event time
    const eventLines = {
      id: "eventLines",
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        events.forEach(ev => {
          const mt = toMin(ev.time);
          const labelIdx = phys.points.indexOf(Math.round(mt / 15) * 15);
          if (labelIdx < 0) return;
          const px = x.getPixelForValue(labelIdx);
          const col = TYPE_COLORS[ev.type] || "#4ade80";
          ctx.save();
          ctx.strokeStyle = col + "55";
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.moveTo(px, y.top);
          ctx.lineTo(px, y.bottom);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = col;
          ctx.font = "9px 'Courier New', monospace";
          ctx.textAlign = "center";
          const shortLabel = ev.type === "gym" ? "GYM" : ev.label.replace("MEAL ", "M");
          ctx.fillText(shortLabel, px, y.top - 4);
          ctx.restore();
        });
      },
    };

    chartRef.current = new window.Chart(canvasRef.current, {
      type: "line",
      data: { labels: phys.labels, datasets },
      plugins: [eventLines],
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 320 },
        layout: { padding: { top: 18, right: 6, bottom: 0, left: 0 } },
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#0d1520",
            titleColor: "#e2e8f0",
            bodyColor: "#cbd5e1",
            borderColor: "#1e293b",
            borderWidth: 1,
            padding: 10,
            cornerRadius: 4,
            titleFont: { size: 11, family: "'Courier New', monospace" },
            bodyFont: { size: 10, family: "'Courier New', monospace" },
            callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%` },
          },
        },
        scales: {
          x: {
            grid: { color: "#1e293b55", lineWidth: 0.5 },
            ticks: {
              color: "#475569",
              font: { size: 9, family: "'Courier New', monospace" },
              maxRotation: 0,
              autoSkip: false,
              callback(val, idx) {
                const t = phys.points[idx];
                if (t === undefined) return "";
                if (t % 120 !== 0) return "";
                return `${padZ(Math.floor(t / 60) % 24)}:00`;
              },
            },
          },
          y: {
            min: 0, max: 100,
            grid: { color: "#1e293b55", lineWidth: 0.5 },
            ticks: {
              color: "#475569",
              font: { size: 9, family: "'Courier New', monospace" },
              stepSize: 25,
              callback: v => v + "%",
            },
          },
        },
      },
    });

    return () => {
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    };
  }, [expanded, events, rest, preset, active]);

  return (
    <div style={{
      background: "#0d1520", border: "1px solid #1e293b",
      borderRadius: "6px", overflow: "hidden",
    }}>
      <div
        className="tap-target"
        onClick={() => setExpanded(!expanded)}
        style={{
          padding: "12px 16px",
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>
            PHYSIOLOGY · 24H
          </div>
          {!expanded && (
            <div style={{ fontSize: "9px", color: "#1e293b", letterSpacing: "1px" }}>
              TAP TO REVEAL
            </div>
          )}
        </div>
        <div style={{ fontSize: "12px", color: "#475569" }}>{expanded ? "▲" : "▼"}</div>
      </div>

      {expanded && (
        <div ref={wrapRef} style={{ padding: "4px 14px 16px" }}>
          {/* Toggle chips */}
          <div style={{
            display: "flex", flexWrap: "wrap", gap: "6px",
            marginBottom: "12px",
          }}>
            {SERIES.map(s => {
              const on = !!active[s.key];
              return (
                <div
                  key={s.key}
                  className="tap-target"
                  onClick={() => toggle(s.key)}
                  style={{
                    display: "flex", alignItems: "center", gap: "6px",
                    padding: "5px 10px", borderRadius: "20px",
                    background: on ? s.color + "1a" : "transparent",
                    border: `1px solid ${on ? s.color + "88" : "#1e293b"}`,
                    fontSize: "10px", letterSpacing: "0.5px",
                    color: on ? s.color : "#475569",
                    transition: "all 0.15s",
                  }}
                >
                  <div style={{
                    width: "7px", height: "7px", borderRadius: "50%",
                    background: s.color,
                    opacity: on ? 1 : 0.3,
                  }}/>
                  {s.label}
                </div>
              );
            })}
          </div>

          <div style={{ position: "relative", width: "100%", height: "260px" }}>
            <canvas ref={canvasRef}/>
          </div>

          <div style={{
            marginTop: "10px", fontSize: "9px", color: "#334155",
            lineHeight: "1.6", letterSpacing: "0.5px",
          }}>
            Curves are normalised 0–100% and anchored to your current{" "}
            <span style={{ color: "#4ade80" }}>
              {rest ? "REST DAY" : `${preset.toUpperCase()} GYM`}
            </span>{" "}
            schedule. Dashed verticals mark meal and gym events.
            Fat oxidation peaks in the green valleys between insulin spikes.
          </div>
        </div>
      )}
    </div>
  );
}

        <div style={{ fontSize: "11px", color: dimmed ? "#334155" : "#475569", lineHeight: "1.5", borderTop: "1px solid #1e293b", paddingTop: "10px" }}>
          {display.note}
        </div>

        <div style={{ fontSize: "10px", color: "#334155" }}>
          Window: {ev.time} – {ev.endTime}
        </div>

        {ev.type === "meal" && (
          <div
            className="tap-target"
            onClick={() => togglePlenny(ev.id)}
            style={{
              display: "inline-flex", alignItems: "center", gap: "6px",
              padding: "8px 14px", borderRadius: "4px",
              background: isSwapped ? "#fb923c22" : "#1e293b44",
              border: `1px solid ${isSwapped ? "#fb923c55" : "#1e293b"}`,
              fontSize: "11px", fontWeight: "bold", letterSpacing: "1px",
              color: isSwapped ? "#fb923c" : "#475569",
              alignSelf: "flex-start",
              transition: "all 0.2s",
            }}
          >
            {isSwapped ? "↩ SWAP BACK" : "⚡ PLENNY PRO"}
          </div>
        )}
      </div>
    );
  };

  /* ----------------------------------------------------------------
     MAIN RENDER
     ---------------------------------------------------------------- */
  return (
    <div style={{
      background: "#080c14", minHeight: "100vh", display: "flex", flexDirection: "column",
      padding: "16px", fontFamily: "'Courier New', Courier, monospace",
      color: "#e2e8f0", gap: "14px", maxWidth: "900px", margin: "0 auto",
    }}>

      {/* ═══ TOP BAR ═══ */}
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: "10px" }}>
        <div>
          <div style={{
            fontSize: "48px", fontWeight: "bold", lineHeight: 1,
            letterSpacing: "-2px", color: "#f1f5f9", fontVariantNumeric: "tabular-nums",
          }}>
            {hh}<span style={{ color: "#334155", animation: "blink 1s step-end infinite" }}>:</span>{mm}
            <span style={{ fontSize: "22px", color: "#475569", marginLeft: "4px" }}>{ss}</span>
          </div>
          <div style={{ fontSize: "11px", color: "#475569", marginTop: "3px", letterSpacing: "2px" }}>
            {DAY_NAMES[now.getDay()].toUpperCase()} {now.getDate()} {MONTH_NAMES[now.getMonth()].toUpperCase()} {now.getFullYear()}
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div
            className="tap-target"
            onClick={toggleRestDay}
            style={{
              display: "inline-block", padding: "5px 16px", borderRadius: "3px",
              fontSize: "12px", fontWeight: "bold", letterSpacing: "3px",
              background: rest ? "#1a2a3a" : "#0f2a1a",
              color: rest ? "#60a5fa" : "#4ade80",
              border: `1px solid ${rest ? "#1e3a5f" : "#1a4a2a"}`,
              transition: "all 0.2s",
            }}
          >
            {rest ? "REST DAY" : "WORKOUT DAY"}
            {isOverridden && <span style={{ fontSize: "9px", marginLeft: "6px", opacity: 0.6 }}>✎</span>}
          </div>
          <div style={{ fontSize: "10px", color: "#334155", marginTop: "4px", letterSpacing: "1px" }}>
            {isOverridden
              ? "MANUAL OVERRIDE · TAP TO UNDO"
              : (rest ? "SUN / THU · LOW CARB · NO GYM" : `GYM ${PRESETS[preset].gymTime}`)
            }
          </div>
        </div>
      </div>

      {/* ═══ SPLIT INDICATOR + WEEKLY PROGRESS ═══ */}
      {(() => {
        const split = TRAINING_SPLIT[now.getDay()];
        const progress = getWeeklyProgress(now);
        return (
          <div style={{
            display: "flex", gap: "8px", alignItems: "stretch",
          }}>
            <div style={{
              flex: "2 1 0",
              padding: "10px 14px", borderRadius: "6px",
              background: split ? "#4ade8018" : "#1a2a3a",
              border: `1px solid ${split ? "#4ade8066" : "#1e3a5f"}`,
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <div>
                <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#334155" }}>TODAY</div>
                <div style={{
                  fontSize: "18px", fontWeight: "bold", letterSpacing: "3px",
                  color: split ? "#4ade80" : "#60a5fa",
                  marginTop: "2px",
                }}>{split || "REST"}</div>
              </div>
              <div style={{
                fontSize: "9px", letterSpacing: "1px", color: "#475569",
                textAlign: "right",
              }}>
                {split ? "TRAINING DAY" : "RECOVERY"}
              </div>
            </div>
            <div style={{
              flex: "1 1 0",
              padding: "10px 14px", borderRadius: "6px",
              background: "#0d1520",
              border: "1px solid #1e293b",
              display: "flex", flexDirection: "column", justifyContent: "center",
            }}>
              <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#334155" }}>THIS WEEK</div>
              <div style={{
                display: "flex", gap: "4px", marginTop: "6px", alignItems: "center",
              }}>
                {SPLIT_ORDER.map((dayNum, i) => {
                  const label = TRAINING_SPLIT[dayNum];
                  const isDone = i < progress.done - (split ? 1 : 0);
                  const isToday = dayNum === now.getDay();
                  return (
                    <div key={dayNum} style={{
                      flex: "1 1 0",
                      height: "6px", borderRadius: "1px",
                      background: isToday ? "#4ade80" : (isDone ? "#4ade8055" : "#1e293b"),
                    }} title={label}/>
                  );
                })}
              </div>
              <div style={{
                fontSize: "10px", color: "#475569",
                marginTop: "5px", letterSpacing: "0.5px",
              }}>
                {progress.done} / {progress.total}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ═══ WORKOUT PRESET SELECTOR ═══ */}
      {!rest && (
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
          {Object.values(PRESETS).map((p) => {
            const active = preset === p.id;
            return (
              <div
                key={p.id}
                className="tap-target"
                onClick={() => selectPreset(p.id)}
                style={{
                  flex: "1 1 0", minWidth: "90px",
                  padding: "10px 12px", borderRadius: "6px",
                  background: active ? "#4ade8018" : "#0d1520",
                  border: `1px solid ${active ? "#4ade8066" : "#1e293b"}`,
                  textAlign: "center",
                  transition: "all 0.2s",
                }}
              >
                <div style={{
                  fontSize: "14px", fontWeight: "bold", letterSpacing: "2px",
                  color: active ? "#4ade80" : "#475569",
                }}>{p.label}</div>
                <div style={{
                  fontSize: "9px", color: active ? "#4ade8099" : "#334155",
                  marginTop: "3px", letterSpacing: "0.5px",
                }}>{p.desc}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* ═══ TIMELINE BAR ═══ */}
      <div style={{ userSelect: "none" }}>
        <div style={{
          position: "relative", height: "38px",
          background: "#0d1520", borderRadius: "4px",
          border: "1px solid #1e293b", overflow: "hidden",
        }}>
          {events.map((ev) => {
            const s = toMin(ev.time);
            const e = toMin(ev.endTime);
            const left  = ((s - DAY_START) / (DAY_END - DAY_START)) * 100;
            const width = ((e - s) / (DAY_END - DAY_START)) * 100;
            const isCurr = currentEvent?.id === ev.id;
            const c = TYPE_COLORS[ev.type] || "#4ade80";
            return (
              <div key={ev.id} style={{
                position: "absolute", left: `${left}%`, width: `${width}%`,
                top: "3px", bottom: "3px",
                background: isCurr ? `${c}30` : `${c}0e`,
                border: `1px solid ${isCurr ? c : c + "44"}`,
                borderRadius: "2px",
                display: "flex", alignItems: "center", justifyContent: "center",
                overflow: "hidden", transition: "background 0.4s",
              }}>
                {width >= 5 && (
                  <span style={{
                    fontSize: "8px", letterSpacing: "0.5px",
                    color: isCurr ? c : c + "99",
                    fontWeight: isCurr ? "bold" : "normal",
                    whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                    padding: "0 3px",
                  }}>{ev.label}</span>
                )}
              </div>
            );
          })}
          {timelinePct >= 0 && timelinePct <= 100 && (
            <div style={{
              position: "absolute", left: `${timelinePct}%`,
              top: 0, bottom: 0, width: "2px",
              background: "#f1f5f9cc", zIndex: 10,
              boxShadow: "0 0 6px #f1f5f944",
            }}>
              <div style={{
                position: "absolute", top: "-1px", left: "50%",
                transform: "translateX(-50%)",
                width: "6px", height: "6px",
                background: "#f1f5f9", borderRadius: "50%",
              }}/>
            </div>
          )}
        </div>
        <div style={{ position: "relative", height: "16px", marginTop: "2px" }}>
          {hourTicks.map(h => {
            const left = ((h * 60 - DAY_START) / (DAY_END - DAY_START)) * 100;
            return (
              <div key={h} style={{
                position: "absolute", left: `${left}%`,
                transform: "translateX(-50%)",
                fontSize: "8px", color: "#334155", letterSpacing: "0.5px",
              }}>{padZ(h)}:00</div>
            );
          })}
        </div>
      </div>

      {/* ═══ PHYSIOLOGY CHART (collapsible, tied to timeline) ═══ */}
      <PhysiologyChart events={events} rest={rest} preset={preset}/>

      {/* ═══ MAIN PANELS ═══ */}
      <div style={{ display: "flex", gap: "14px", flex: 1, flexWrap: "wrap" }}>
        {/* Current event */}
        <div style={{
          flex: "1 1 320px", minWidth: "280px",
          background: "#0d1520",
          border: `1px solid ${currentEvent ? (TYPE_COLORS[currentEvent.type] || "#4ade80") + "55" : "#1e293b"}`,
          borderRadius: "6px", padding: "16px 20px",
          display: "flex", flexDirection: "column", gap: "12px",
        }}>
          <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>▶ RIGHT NOW</div>
          {allDone && (
            <div style={{ color: "#475569", fontSize: "15px", lineHeight: "1.6" }}>
              Day complete. Rest up.<br/>
              Prep tomorrow's chicken + pasta if you haven't already.<br/>
              Sleep by 22:30 — GH release peaks in deep sleep.
            </div>
          )}
          {beforeDay && (
            <div>
              <div style={{ fontSize: "18px", color: "#4ade80", fontWeight: "bold" }}>
                {rest ? "Rest day — take it easy" : "Morning — get your 10K steps in"}
              </div>
              <div style={{ fontSize: "12px", color: "#475569", marginTop: "8px", lineHeight: "1.5" }}>
                {rest
                  ? "First meal at 08:30. No gym today — recover and let muscles repair."
                  : preset === "morning"
                    ? "Pre-gym fuel at 06:30. Skip the fasted walk — gym IS the exercise today."
                    : "Fasted walk while insulin is low — peak fat oxidation window. First meal at 08:30."
                }
              </div>
            </div>
          )}
          {!currentEvent && !allDone && !beforeDay && (
            <div>
              <div style={{ fontSize: "16px", color: "#64748b" }}>Between meals</div>
              <div style={{ fontSize: "12px", color: "#334155", marginTop: "6px" }}>
                Stay hydrated — water + High5 Zero electrolyte tablet. Target 4L daily.
              </div>
            </div>
          )}
          {currentEvent && renderEventCard(currentEvent, true, false)}
        </div>

        {/* Next event */}
        <div style={{
          flex: "1 1 320px", minWidth: "280px",
          background: "#0a1020", border: "1px solid #1e293b",
          borderRadius: "6px", padding: "16px 20px",
          display: "flex", flexDirection: "column", gap: "12px",
          opacity: nextEvent ? 1 : 0.35,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>↗ UP NEXT</div>
            {nextEvent && countdownMs !== null && (
              <div style={{
                fontSize: "22px", fontWeight: "bold",
                color: countdownMs < 30 * 60000 ? "#f97316" : "#475569",
                fontVariantNumeric: "tabular-nums", letterSpacing: "-1px",
              }}>{formatCountdown(countdownMs)}</div>
            )}
          </div>
          {!nextEvent && <div style={{ fontSize: "13px", color: "#334155" }}>No more events today.</div>}
          {nextEvent && renderEventCard(nextEvent, false, true)}
        </div>
      </div>

      {/* ═══ FULL SCHEDULE (collapsible) ═══ */}
      <ScheduleList
        events={events}
        currentEvent={currentEvent}
        plenny={plenny}
        togglePlenny={togglePlenny}
        rest={rest}
      />

      {/* ═══ FOOTER ═══ */}
      {(() => {
        const macros = computeDayMacros(events);
        return (
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            borderTop: "1px solid #0d1520", paddingTop: "8px", flexWrap: "wrap", gap: "6px",
          }}>
            <div style={{ fontSize: "9px", color: "#334155", letterSpacing: "2px" }}>
              TARGET · {macros.kcal} KCAL · {macros.p}P / {macros.c}C / {macros.f}F · 4L WATER
            </div>
            <div style={{ fontSize: "9px", color: "#1e293b", letterSpacing: "1px" }}>
              {rest ? "REST" : "WORKOUT"} · GOAL 68 KG
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ================================================================
   SCHEDULE LIST COMPONENT
   ================================================================ */
function ScheduleList({ events, currentEvent, plenny, togglePlenny, rest }) {
  const [expanded, setExpanded] = useState(false);
  const [expandedItem, setExpandedItem] = useState(null);

  const toggleItem = (id) => setExpandedItem(prev => prev === id ? null : id);

  return (
    <div style={{
      background: "#0d1520", border: "1px solid #1e293b",
      borderRadius: "6px", overflow: "hidden",
    }}>
      <div
        className="tap-target"
        onClick={() => setExpanded(!expanded)}
        style={{
          padding: "12px 16px",
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}
      >
        <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>
          {rest ? "REST DAY SCHEDULE" : "TODAY'S SCHEDULE"}
        </div>
        <div style={{ fontSize: "12px", color: "#475569" }}>{expanded ? "▲" : "▼"}</div>
      </div>

      {expanded && (
        <div style={{ padding: "0 16px 12px", display: "flex", flexDirection: "column", gap: "6px" }}>
          {events.map((ev) => {
            const c = TYPE_COLORS[ev.type] || "#4ade80";
            const isCurr = currentEvent?.id === ev.id;
            const isSwapped = ev.type === "meal" && plenny[ev.id];
            const isItemExpanded = expandedItem === ev.id;
            const eggCount = (!isSwapped && ev.type === "meal") ? getMealEggs(events, ev.id) : 0;
            const transformedItems = ev.type === "meal" && !isSwapped
              ? transformMealItems(ev.items, eggCount, ev.useTuna)
              : ev.items;
            const macros = ev.type === "meal" && !isSwapped
              ? computeItemsMacros(transformedItems)
              : null;
            return (
              <div key={ev.id} style={{
                borderRadius: "4px",
                background: isCurr ? c + "15" : (isItemExpanded ? "#0a1020" : "transparent"),
                border: isCurr ? `1px solid ${c}33` : (isItemExpanded ? "1px solid #1e293b" : "1px solid transparent"),
              }}>
                <div
                  className="tap-target"
                  onClick={() => toggleItem(ev.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: "10px",
                    padding: "8px 10px",
                  }}
                >
                  <div style={{
                    fontSize: "11px", color: isCurr ? c : "#475569",
                    fontVariantNumeric: "tabular-nums", minWidth: "42px",
                    fontWeight: isCurr ? "bold" : "normal",
                  }}>{ev.time}</div>
                  <div style={{
                    width: "6px", height: "6px", borderRadius: "50%",
                    background: isCurr ? c : c + "66", flexShrink: 0,
                  }}/>
                  <div style={{
                    flex: 1, fontSize: "12px",
                    color: isCurr ? "#e2e8f0" : "#64748b",
                    fontWeight: isCurr ? "bold" : "normal",
                  }}>
                    {isSwapped ? "PLENNY PRO" : ev.label}
                    {ev.tag && !isSwapped && (
                      <span style={{ fontSize: "9px", color: "#334155", marginLeft: "8px" }}>{ev.tag}</span>
                    )}
                  </div>
                  {macros && !isItemExpanded && (
                    <div style={{
                      fontSize: "9px", color: "#475569", letterSpacing: "0.5px",
                      fontVariantNumeric: "tabular-nums",
                    }}>
                      {macros.kcal} kcal
                    </div>
                  )}
                  {ev.type === "meal" && (
                    <div
                      className="tap-target"
                      onClick={(e) => { e.stopPropagation(); togglePlenny(ev.id); }}
                      style={{
                        padding: "4px 8px", borderRadius: "3px",
                        fontSize: "9px", letterSpacing: "0.5px",
                        background: isSwapped ? "#fb923c22" : "#1e293b44",
                        color: isSwapped ? "#fb923c" : "#334155",
                        border: `1px solid ${isSwapped ? "#fb923c44" : "#1e293b"}`,
                      }}
                    >
                      {isSwapped ? "UNDO" : "⚡PP"}
                    </div>
                  )}
                  <div style={{ fontSize: "10px", color: "#334155", marginLeft: "2px" }}>
                    {isItemExpanded ? "▲" : "▼"}
                  </div>
                </div>

                {isItemExpanded && (
                  <div style={{
                    padding: "4px 14px 12px 52px",
                    display: "flex", flexDirection: "column", gap: "5px",
                  }}>
                    {transformedItems.map((item, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "6px" }}>
                        <span style={{ color: c + "88", flexShrink: 0, fontSize: "11px" }}>›</span>
                        <span style={{ fontSize: "11px", color: "#94a3b8", lineHeight: "1.4" }}>{item}</span>
                      </div>
                    ))}
                    {macros && (
                      <div style={{
                        marginTop: "6px", padding: "6px 10px",
                        background: "#0a1020", border: "1px solid #1e293b",
                        borderRadius: "3px",
                        display: "flex", gap: "10px", flexWrap: "wrap",
                        fontSize: "10px", letterSpacing: "0.5px",
                        fontVariantNumeric: "tabular-nums",
                      }}>
                        <span style={{ color: c, fontWeight: "bold" }}>{macros.kcal} KCAL</span>
                        <span style={{ color: "#475569" }}>{macros.p}P</span>
                        <span style={{ color: "#475569" }}>{macros.c}C</span>
                        <span style={{ color: "#475569" }}>{macros.f}F</span>
                      </div>
                    )}
                    {ev.note && (
                      <div style={{
                        marginTop: "6px", fontSize: "10px",
                        color: "#475569", lineHeight: "1.5",
                        fontStyle: "italic",
                      }}>
                        {ev.note}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
