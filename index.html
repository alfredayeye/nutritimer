<div id="root"></div>
<script type="text/babel">
/* ================================================================
   NUTRITIMER — MEAL TIMING DASHBOARD
   ================================================================
   PURPOSE:
   Real-time dashboard that tells the user exactly what to eat and when,
   based on their workout schedule for the day. Designed for maximum
   simplicity — ONE protein, ONE carb, ONE green, plus eggs and banana.

   USER PROFILE (as of March 2026):
   - 30M, 169cm, 75.3kg (down from 80.2kg on Feb 17)
   - Body fat: ~23.2% → goal 15% (~68kg target weight)
   - Recomp in progress: muscle +2.3%, fat -2.4% over last quarter
   - Rate of loss: ~0.8 kg/week target (safe for muscle preservation)
   - Lean mass flagged "Low" — must protect with high protein + training

   CORE PRINCIPLES:
   1. Carbs BEFORE the gym — red lentil pasta in all pre-gym meals.
      User learned the hard way that training on empty glycogen = bad.
   2. Chicken thighs provide BOTH protein (19.5g/100g) AND fat (6.2g/100g)
      in every meal — no need for separate fat sources or olive oil.
   3. No breakfast — morning is for fasted 10K steps (fat oxidation
      at peak during low-intensity fasted cardio). First meal at 08:30+.
   4. Rest days default to Sun/Thu (auto-detected). Manual override toggle
      available for days when gym isn't possible (sailing, travel, etc.).
      Override is date-scoped in localStorage — auto-expires at midnight.
   5. Post-gym / last meal adds 1 egg for extra fat to hit daily target.

   CALORIE TARGETS (revised for 75.3kg, safe recomp rate):
   - Workout days: ~1,750 kcal — 178P / 161C / 46F
   - Rest days:    ~1,400 kcal — 173P /  60C / 55F
   - Weekly average: ~1,650 kcal/day
   - TDEE estimated ~2,646 → deficit ~1,000/day → ~0.8 kg/week loss

   FOOD SOURCING — Tesco Dun Laoghaire, Ireland (minimal shopping list):
   ┌──────────────────────────────────────────────────────────────────┐
   │  ITEM                          │ DEAL              │ WEEKLY     │
   │  Chicken boneless thighs 420g  │ 3 for €10 CC      │ ~€33.50   │
   │  Red lentil pasta 250g         │ €1.50/bag          │ ~€4.50    │
   │  Broccoli                      │ —                  │ ~€3-4     │
   │  Eggs (dozen)                  │ —                  │ ~€3       │
   │  Bananas                       │ —                  │ ~€1       │
   │                                │ TOTAL              │ ~€45-50   │
   └──────────────────────────────────────────────────────────────────┘

   CHICKEN THIGHS NUTRITION (Tesco Irish boneless skinless, per 100g):
   134 kcal · 19.5g protein · 6.2g fat (1.8g sat) · 0g carb

   RED LENTIL PASTA NUTRITION (Tesco High Protein fusilli, per 100g cooked):
   186 kcal · 12.3g protein · 0.7g fat · 31.1g carb · 3.2g fibre
   (75g dry ≈ 170g cooked. Gluten free. Source of fibre.)

   SUPPLEMENT NOTES (bought in-store, not tracked as separate events):
   - ON Pre-Workout (contains 3.4g creatine) — take 30min before gym
   - Creatine 5g standalone — rest days only (pre-workout covers gym days)
   - Omega-3 (Seven Seas Max Strength) — take with any meal (fat present)
   - ON Electrolyte Powder — sip during gym (~5g carbs, count toward total)
   - Plenny Pro (Jimmy Joy) — 40g protein, 400kcal meal replacement for on-the-go

   WORKOUT PRESETS:
   User taps to select gym time. Fixed meal times: 08:30, 12:30, 16:30, 20:30.
   Only exception: morning gym shifts meal 1 to 10:00 (you're in the gym at 08:30).
   - MORNING (08:00): Banana pre-gym, all pasta meals post-workout
   - MIDDAY  (14:00): 2 pasta meals before, 1 after, best carb balance
   - EVENING (18:00): 3 pasta meals before gym, maximum fuel (default)

   WHY CHICKEN THIGHS AS SOLE PROTEIN:
   - Provides both protein AND fat in one food — no olive oil, no beef, no second protein
   - 3-for-€10 Clubcard deal on 420g packs — cheapest protein per gram on deal
   - 6.2g fat/100g is moderate: enough for hormones, not enough to wreck
     pre-workout gastric emptying (~7.4g fat in a 120g serving)
   - Simplest possible plan: user buys ONE protein source

   WHY RED LENTIL PASTA OVER BULGUR/POTATO:
   - 12.3g protein per 100g cooked — highest protein carb, stacks with chicken
   - Gluten free, good fibre (3.2g/100g)
   - €1.50/250g dry bag — cheap and shelf-stable
   - Lower GI than potato — sustained energy, no crash mid-workout

   PORTIONS — identical per meal for easy Cronometer tracking:
   - Workout day: 120g chicken × 4 meals, 110g cooked pasta × 3 carb meals,
     100g broccoli × 4 meals, 1 banana (pre-gym), 1 egg (last meal)
   - Rest day: 175g chicken × 4 meals, 100g cooked pasta × 1 meal,
     100g broccoli × 4 meals, 1 egg × 2 meals (meal 2 + meal 4)

   MEAL TIMES — fixed at 08:30, 12:30, 16:30, 20:30 every day.
   Only exception: morning gym (08:00) shifts meal 1 to 10:00
   because you're literally in the gym at 08:30.

   MACRO VERIFICATION (workout day — from Cronometer):
   480g chicken (120g × 4): 643.2 kcal
   330g cooked pasta (110g × 3): 615.3 kcal
   400g broccoli (100g × 4): 162.4 kcal
   1 banana: 103.8 kcal
   1 egg: 77.5 kcal
   ON Pre-Workout: 32.0 kcal
   Whey protein 2 scoops (optional): 110.1 kcal
   TOTAL: 1744.3 kcal · 179.5P / 143C / 41.6F ✓
   (vs target 1750 kcal · 178P / 161C / 46F)

   MACRO VERIFICATION (rest day):
   700g chicken: 136.5P, 43.4F, 0C = 938 kcal
   100g cooked pasta: 12.3P, 0.7F, 31.1C = 186 kcal
   400g broccoli (100g × 4): 11.2P, 1.6F, 28C = 136 kcal
   2 eggs: 12.6P, 9.6F, 0.8C = 144 kcal
   TOTAL: 172.6P, 55.3F, 59.9C = ~1,404 kcal ✓
   ================================================================ */

const { useState, useEffect, useCallback } = React;

/* ----------------------------------------------------------------
   CONSTANTS
   ---------------------------------------------------------------- */
const DAY_NAMES   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const padZ = (n) => String(n).padStart(2, "0");
const toMin = (t) => { const [h,m] = t.split(":").map(Number); return h * 60 + m; };

const DAY_START = 6 * 60;
const DAY_END   = 23 * 60;

const TYPE_COLORS = {
  meal: "#4ade80",
  fuel: "#fb923c",
  gym:  "#60a5fa",
};

/* Plenny Pro — swaps any meal when user taps the button */
const PLENNY_PRO = {
  label: "PLENNY PRO",
  tag: "MEAL REPLACEMENT",
  items: ["1 serving Plenny Pro shake", "Mix with 400ml cold water"],
  note: "Jimmy Joy Plenny Pro — 40g protein, 400kcal. Use when you're on the go and can't prep a real meal. Log in Cronometer and adjust remaining meals if needed.",
  supplements: [],
};

/* ----------------------------------------------------------------
   MEAL TEMPLATES
   ----------------------------------------------------------------
   Every meal is built from the same 5 ingredients:
   chicken thighs, red lentil pasta, broccoli, eggs, banana.

   Meals differ only in whether they include pasta (carb meals)
   and/or egg (fat-boosting meals). This is the simplicity:
   one protein source, one carb source, one green.

   The `id` field must be unique across all events in a preset
   so that Plenny Pro swaps work correctly per-meal.
   ---------------------------------------------------------------- */

/* Carb + Protein meal — chicken + pasta + broccoli.
   Used in pre-gym slots where glycogen loading matters.
   110g cooked pasta per meal across 3 carb meals. */
const MEAL_CARB = {
  id: "carb", label: "MEAL", type: "meal",
  tag: "CARB + PROTEIN",
  items: [
    "120g chicken boneless thighs",
    "110g cooked red lentil pasta",
    "100g broccoli",
  ],
  note: "Chicken provides protein + fat naturally. Lentil pasta adds protein and carbs. Fat from chicken is moderate enough to not slow gastric emptying significantly.",
  supplements: [],
};

/* Pre-gym carb meal — same as MEAL_CARB but with banana for fast-acting glucose.
   Must be eaten 1.5+ hours before gym for digestion. The banana peaks ~30min,
   the pasta sustains through the session. */
const MEAL_PRE_GYM = {
  id: "pre-gym", label: "MEAL", type: "meal",
  tag: "PRE-GYM · CARB + PROTEIN",
  items: [
    "120g chicken boneless thighs",
    "110g cooked red lentil pasta",
    "1 banana",
    "100g broccoli",
  ],
  note: "Two-wave carb delivery: banana peaks ~30min for fast glucose, lentil pasta sustains through the session. Take your pre-workout 30min before gym. Do NOT skip the pasta — this is what fuels the workout.",
  supplements: ["ON Pre-Workout — 30min before gym"],
};

/* No-carb meal — chicken + broccoli only.
   Used in post-gym or late-day slots where low insulin is preferred.
   On workout days, chicken's built-in fat (6.2g/100g) covers fat needs
   without adding external fat sources. */
const MEAL_NOCARB = {
  id: "nocarb", label: "MEAL", type: "meal",
  tag: "PROTEIN + FAT · NO CARBS",
  items: [
    "120g chicken boneless thighs",
    "100g broccoli",
  ],
  note: "No carbs = low insulin = fat oxidation mode. Chicken's 6.2g fat per 100g provides fat naturally — no olive oil needed. Simple.",
  supplements: [],
};

/* Last meal of the day — chicken + egg + broccoli.
   The egg adds 4.8g fat to push daily fat total above the 40g hormone floor.
   Placed as the final meal for slow overnight protein delivery. */
const MEAL_LAST = {
  id: "last", label: "MEAL", type: "meal",
  tag: "PROTEIN + FAT · LAST MEAL",
  items: [
    "120g chicken boneless thighs",
    "1 whole egg",
    "100g broccoli",
    "Whey protein shake (optional — if needed for protein target)",
  ],
  note: "Egg adds 6.3g protein + 4.8g fat to push daily fat above the 40g hormone floor. Low insulin going into sleep maximises overnight GH release and fat oxidation. Chicken + egg = slow-digesting protein feeds muscles overnight.",
  supplements: ["Omega-3 — 1 capsule (fat present aids absorption)"],
};

/* Pre-gym fuel — banana only. Used for morning gym when there's no time
   for a full meal. NOT a real meal — just quick glucose. */
const MEAL_FUEL = {
  id: "fuel", label: "PRE-GYM FUEL", type: "fuel",
  tag: "FAST CARBS",
  items: [
    "1 banana",
  ],
  note: "Minimal digestion time — banana glucose peaks in ~20min. This is NOT a full meal. Take your pre-workout at 07:30. Morning gym means no fasted walk today — the gym IS the exercise.",
  supplements: ["ON Pre-Workout — take at 07:30"],
};

/* Gym event — same across all presets, just different time slots */
const makeGym = (carbMeals) => ({
  type: "gym", id: "gym", label: "GYM", tag: "TRAINING",
  items: [
    "Resistance training session",
    "Sip ON Electrolytes throughout (~5g carbs)",
  ],
  note: `${carbMeals} carb meal${carbMeals !== 1 ? 's' : ''} digested — glycogen ${carbMeals >= 2 ? 'is loaded' : 'from last night + banana fuel'}. Catecholamines suppress insulin ~40-60%, GLUT4 drives glucose uptake independently.`,
  supplements: ["ON Electrolyte Powder — sip throughout"],
});

/* ----------------------------------------------------------------
   WORKOUT PRESETS
   ----------------------------------------------------------------
   Each preset arranges the same food across different time slots
   depending on when the gym session happens. The KEY CONSTRAINT:
   carb (pasta) meals go BEFORE the gym for glycogen loading.
   Post-gym / evening meals are no-carb (chicken + broccoli only).

   All presets total 480g chicken (120g × 4), 330g cooked pasta (110g × 3),
   400g broccoli (100g × 4), 1 banana, 1 egg = ~1,744 kcal.

   The egg always goes in the LAST meal of the day.
   ---------------------------------------------------------------- */

const PRESETS = {
  morning: {
    id: "morning",
    label: "MORNING",
    gymTime: "08:00",
    desc: "Gym at 08:00 · Banana only pre-gym · No fasted walk",
    /* Morning is the toughest for carb loading — only a banana before
       the session. All 3 pasta meals come AFTER the gym for recovery
       and restocking glycogen for the next day. The tradeoff: less fuel
       for this session, but the workout still works with overnight
       glycogen + banana. Best for lighter training days.
       EXCEPTION: meal 1 at 10:00 instead of 08:30 — you're in the gym. */
    events: [
      { ...MEAL_FUEL, time: "06:30", endTime: "07:30" },
      { ...makeGym(0), time: "08:00", endTime: "09:30" },
      { ...MEAL_CARB,    time: "10:00", endTime: "12:30", id: "carb-1", label: "MEAL 1",
        tag: "POST-WORKOUT · CARB + PROTEIN",
        note: "Post-workout GLUT4 elevation — carbs shuttle straight to muscle glycogen. This is your biggest meal. Eat all the broccoli you want." },
      { ...MEAL_CARB,    time: "12:30", endTime: "16:30", id: "carb-2", label: "MEAL 2" },
      { ...MEAL_CARB,    time: "16:30", endTime: "20:30", id: "carb-3", label: "MEAL 3" },
      { ...MEAL_LAST,    time: "20:30", endTime: "22:30", label: "MEAL 4" },
    ],
  },

  midday: {
    id: "midday",
    label: "MIDDAY",
    gymTime: "14:00",
    desc: "Gym at 14:00 · 2 carb meals before · Best balance",
    /* Midday is the sweet spot — two full pasta meals digested before
       the session. One more pasta meal post-workout for recovery.
       Last meal is chicken + egg, no carbs.
       Fixed meal times: 08:30, 12:30, 16:30, 20:30. */
    events: [
      { ...MEAL_CARB,    time: "08:30", endTime: "12:30", id: "carb-1", label: "MEAL 1" },
      { ...MEAL_PRE_GYM, time: "12:30", endTime: "13:30", label: "MEAL 2" },
      { ...makeGym(2), time: "14:00", endTime: "15:30" },
      { ...MEAL_CARB,    time: "16:30", endTime: "20:30", id: "carb-3", label: "MEAL 3",
        tag: "POST-WORKOUT · CARB + PROTEIN",
        note: "Post-workout GLUT4 elevation — carbs go straight to muscle glycogen recovery. Lentil pasta's slower digestion is ideal here, no urgency." },
      { ...MEAL_LAST,    time: "20:30", endTime: "22:30", label: "MEAL 4" },
    ],
  },

  evening: {
    id: "evening",
    label: "EVENING",
    gymTime: "18:00",
    desc: "Gym at 18:00 · 3 carb meals · Maximum fuel · Default",
    /* Evening is the default and highest-performance option — three pasta
       meals throughout the day means glycogen is fully stocked. The tradeoff
       is a late post-workout dinner at 20:30 with no carbs. */
    events: [
      { ...MEAL_CARB,    time: "08:30", endTime: "12:30", id: "carb-1", label: "MEAL 1" },
      { ...MEAL_CARB,    time: "12:30", endTime: "16:30", id: "carb-2", label: "MEAL 2" },
      { ...MEAL_PRE_GYM, time: "16:30", endTime: "17:30", label: "MEAL 3" },
      { ...makeGym(3), time: "18:00", endTime: "19:30" },
      { ...MEAL_LAST,    time: "20:30", endTime: "22:30", label: "MEAL 4",
        tag: "POST-WORKOUT · PROTEIN + FAT",
        note: "Post-workout GLUT4 still elevated. Chicken + egg provides protein for recovery. The egg's 4.8g fat pushes daily total above the 40g hormone floor. No carbs — you've had 150g already today. Sleep by 22:30 for GH release." },
    ],
  },
};

/* ----------------------------------------------------------------
   REST DAY MEALS
   ----------------------------------------------------------------
   Only the FIRST meal includes pasta (small portion: ~100g cooked /
   ~44g dry). Remaining meals are chicken + broccoli +/- eggs.
   This keeps insulin low for 12+ hours, maximising fat oxidation
   on the days you're not training.

   Total: 700g chicken, 100g cooked pasta, 400g broccoli, 2 eggs
   = ~1,370 kcal · 170P / 55F / 52C

   Auto-triggered on Sunday (0) and Thursday (4).
   Can be manually overridden via the tappable day-type badge.
   ---------------------------------------------------------------- */
const REST_EVENTS = [
  {
    id: "rest-1", label: "MEAL 1", type: "meal",
    tag: "LAST CARB MEAL TODAY",
    time: "08:30", endTime: "12:30",
    items: [
      "175g chicken boneless thighs",
      "100g cooked red lentil pasta",
      "100g broccoli",
    ],
    note: "Last starch of the day. Only ~31g carbs — just enough to keep thyroid and metabolism responsive. No carbs after this on rest days. Afternoon insulin stays low, maximising fat oxidation for 12+ hours.",
    supplements: [],
  },
  {
    id: "rest-2", label: "MEAL 2", type: "meal",
    tag: "NO CARBS",
    time: "12:30", endTime: "16:30",
    items: [
      "175g chicken boneless thighs",
      "1 whole egg",
      "100g broccoli",
    ],
    note: "Egg adds extra fat here — with no carbs present, there's no insulin spike to shuttle fat into storage. Fat goes to oxidation and hormone maintenance. Chicken + egg = 40g protein.",
    supplements: ["Omega-3 — 1 capsule (fat present aids absorption)"],
  },
  {
    id: "rest-3", label: "MEAL 3", type: "meal",
    tag: "NO CARBS",
    time: "16:30", endTime: "20:30",
    items: [
      "175g chicken boneless thighs",
      "100g broccoli",
    ],
    note: "Simple. Chicken and broccoli. Fat oxidation continues. Stay hydrated.",
    supplements: ["Creatine 5g standalone — rest day maintenance dose"],
  },
  {
    id: "rest-4", label: "MEAL 4", type: "meal",
    tag: "NO CARBS · LAST MEAL",
    time: "20:30", endTime: "22:30",
    items: [
      "175g chicken boneless thighs",
      "1 whole egg",
      "100g broccoli",
    ],
    note: "Low insulin going into sleep. Chicken provides slow-digesting protein for overnight muscle repair. Egg adds final fat contribution. Maximises overnight GH release and fat oxidation. Sleep by 22:30.",
    supplements: [],
  },
];

/* ----------------------------------------------------------------
   REST DAY DETECTION + OVERRIDE
   ----------------------------------------------------------------
   Auto: Sunday (0) and Thursday (4).
   Override: tappable badge stores today's date in localStorage.
   Auto-expires at midnight — no stale overrides carrying forward.
   ---------------------------------------------------------------- */
const isAutoRestDay = (d) => d.getDay() === 0 || d.getDay() === 4;
const todayKey = (d) => `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`;

const loadRestOverride = () => {
  try {
    const stored = JSON.parse(localStorage.getItem("nutritimer-rest-override") || "{}");
    if (stored.date === todayKey(new Date())) return stored.value;
    return null;
  } catch { return null; }
};
const saveRestOverride = (value) => {
  try {
    localStorage.setItem("nutritimer-rest-override", JSON.stringify({ date: todayKey(new Date()), value }));
  } catch {}
};
const clearRestOverride = () => {
  try { localStorage.removeItem("nutritimer-rest-override"); } catch {}
};

/* ----------------------------------------------------------------
   HELPERS
   ---------------------------------------------------------------- */
const formatCountdown = (diffMs) => {
  if (diffMs <= 0) return "NOW";
  const totalSec = Math.floor(diffMs / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${padZ(m)}m`;
  if (m > 0) return `${m}m ${padZ(s)}s`;
  return `${s}s`;
};

const loadPreset = () => {
  try { return localStorage.getItem("nutritimer-preset") || "evening"; }
  catch { return "evening"; }
};
const savePreset = (v) => {
  try { localStorage.setItem("nutritimer-preset", v); } catch {}
};
const loadSwaps = () => {
  try { return JSON.parse(localStorage.getItem("nutritimer-swaps") || "{}"); }
  catch { return {}; }
};
const saveSwaps = (v) => {
  try { localStorage.setItem("nutritimer-swaps", JSON.stringify(v)); } catch {}
};

/* ================================================================
   MAIN DASHBOARD COMPONENT
   ================================================================ */
function Dashboard() {
  const [now, setNow]         = useState(new Date());
  const [preset, setPreset]   = useState(loadPreset);
  const [plenny, setPlenny]   = useState(loadSwaps);
  const [restOverride, setRestOverride] = useState(loadRestOverride);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const selectPreset = useCallback((p) => {
    setPreset(p);
    savePreset(p);
  }, []);

  const togglePlenny = useCallback((eventId) => {
    setPlenny(prev => {
      const next = { ...prev };
      if (next[eventId]) delete next[eventId];
      else next[eventId] = true;
      saveSwaps(next);
      return next;
    });
  }, []);

  const toggleRestDay = useCallback(() => {
    setRestOverride(prev => {
      if (prev !== null) {
        clearRestOverride();
        return null;
      }
      const forced = !isAutoRestDay(new Date());
      saveRestOverride(forced);
      return forced;
    });
  }, []);

  /* --- Derived state --- */
  const autoRest = isAutoRestDay(now);
  const rest     = restOverride !== null ? restOverride : autoRest;
  const isOverridden = restOverride !== null;
  const events = rest ? REST_EVENTS : PRESETS[preset].events;
  const nowMin = now.getHours() * 60 + now.getMinutes();

  let currentEvent = null, nextEvent = null;
  for (let i = 0; i < events.length; i++) {
    const s = toMin(events[i].time);
    const e = toMin(events[i].endTime);
    if (nowMin >= s && nowMin < e) {
      currentEvent = events[i];
      nextEvent = events[i + 1] || null;
      break;
    }
    if (nowMin < s) {
      nextEvent = events[i];
      break;
    }
  }
  const allDone   = !currentEvent && !nextEvent && nowMin >= toMin(events[events.length - 1].endTime);
  const beforeDay = !currentEvent && !nextEvent && nowMin < toMin(events[0].time);

  let countdownMs = null;
  if (nextEvent) {
    const midnight = new Date(now);
    midnight.setHours(0, 0, 0, 0);
    countdownMs = midnight.getTime() + toMin(nextEvent.time) * 60000 - now.getTime();
  }

  const timelinePct = Math.min(100, Math.max(0, ((nowMin - DAY_START) / (DAY_END - DAY_START)) * 100));
  const hourTicks = [6, 8, 10, 12, 14, 16, 18, 20, 22];

  const hh = padZ(now.getHours());
  const mm = padZ(now.getMinutes());
  const ss = padZ(now.getSeconds());

  /* ----------------------------------------------------------------
     RENDER: Event card (used for both "current" and "next" panels)
     ---------------------------------------------------------------- */
  const renderEventCard = (ev, isCurrent, dimmed) => {
    if (!ev) return null;
    const c = TYPE_COLORS[ev.type] || "#4ade80";
    const isSwapped = ev.type === "meal" && plenny[ev.id];
    const display = isSwapped ? { ...PLENNY_PRO, id: ev.id, type: "meal", time: ev.time, endTime: ev.endTime } : ev;

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: "10px", flexWrap: "wrap" }}>
            {isCurrent && (
              <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: c, animation: "pulse 2s ease-in-out infinite", flexShrink: 0 }}/>
            )}
            <span style={{ fontSize: "20px", fontWeight: "bold", color: isCurrent ? c : "#64748b" }}>{display.label}</span>
          </div>
          {display.tag && (
            <div style={{
              display: "inline-block", marginTop: "6px",
              padding: "2px 10px", borderRadius: "2px",
              fontSize: "9px", letterSpacing: "2px", fontWeight: "bold",
              background: isCurrent ? c + "22" : c + "11",
              color: isCurrent ? c : "#475569",
            }}>{display.tag}</div>
          )}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: "7px" }}>
          {display.items.map((item, i) => (
            <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "8px" }}>
              <span style={{ color: isCurrent ? c : "#334155", flexShrink: 0, marginTop: "1px" }}>›</span>
              <span style={{ fontSize: "14px", color: isCurrent ? "#cbd5e1" : "#475569", lineHeight: "1.4" }}>{item}</span>
            </div>
          ))}
        </div>

        {display.supplements && display.supplements.length > 0 && (
          <div style={{
            background: "#facc1511", border: "1px solid #facc1533",
            borderRadius: "4px", padding: "10px 14px",
          }}>
            <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#facc15", marginBottom: "6px" }}>SUPPLEMENTS</div>
            {display.supplements.map((s, i) => (
              <div key={i} style={{ fontSize: "12px", color: "#fde68a", lineHeight: "1.6" }}>· {s}</div>
            ))}
          </div>
        )}

        <div style={{ fontSize: "11px", color: dimmed ? "#334155" : "#475569", lineHeight: "1.5", borderTop: "1px solid #1e293b", paddingTop: "10px" }}>
          {display.note}
        </div>

        <div style={{ fontSize: "10px", color: "#334155" }}>
          Window: {ev.time} – {ev.endTime}
        </div>

        {ev.type === "meal" && (
          <div
            className="tap-target"
            onClick={() => togglePlenny(ev.id)}
            style={{
              display: "inline-flex", alignItems: "center", gap: "6px",
              padding: "8px 14px", borderRadius: "4px",
              background: isSwapped ? "#fb923c22" : "#1e293b44",
              border: `1px solid ${isSwapped ? "#fb923c55" : "#1e293b"}`,
              fontSize: "11px", fontWeight: "bold", letterSpacing: "1px",
              color: isSwapped ? "#fb923c" : "#475569",
              alignSelf: "flex-start",
              transition: "all 0.2s",
            }}
          >
            {isSwapped ? "↩ SWAP BACK" : "⚡ PLENNY PRO"}
          </div>
        )}
      </div>
    );
  };

  /* ----------------------------------------------------------------
     MAIN RENDER
     ---------------------------------------------------------------- */
  return (
    <div style={{
      background: "#080c14", minHeight: "100vh", display: "flex", flexDirection: "column",
      padding: "16px", fontFamily: "'Courier New', Courier, monospace",
      color: "#e2e8f0", gap: "14px", maxWidth: "900px", margin: "0 auto",
    }}>

      {/* ═══ TOP BAR ═══ */}
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: "10px" }}>
        <div>
          <div style={{
            fontSize: "48px", fontWeight: "bold", lineHeight: 1,
            letterSpacing: "-2px", color: "#f1f5f9", fontVariantNumeric: "tabular-nums",
          }}>
            {hh}<span style={{ color: "#334155", animation: "blink 1s step-end infinite" }}>:</span>{mm}
            <span style={{ fontSize: "22px", color: "#475569", marginLeft: "4px" }}>{ss}</span>
          </div>
          <div style={{ fontSize: "11px", color: "#475569", marginTop: "3px", letterSpacing: "2px" }}>
            {DAY_NAMES[now.getDay()].toUpperCase()} {now.getDate()} {MONTH_NAMES[now.getMonth()].toUpperCase()} {now.getFullYear()}
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div
            className="tap-target"
            onClick={toggleRestDay}
            style={{
              display: "inline-block", padding: "5px 16px", borderRadius: "3px",
              fontSize: "12px", fontWeight: "bold", letterSpacing: "3px",
              background: rest ? "#1a2a3a" : "#0f2a1a",
              color: rest ? "#60a5fa" : "#4ade80",
              border: `1px solid ${rest ? "#1e3a5f" : "#1a4a2a"}`,
              transition: "all 0.2s",
            }}
          >
            {rest ? "REST DAY" : "WORKOUT DAY"}
            {isOverridden && <span style={{ fontSize: "9px", marginLeft: "6px", opacity: 0.6 }}>✎</span>}
          </div>
          <div style={{ fontSize: "10px", color: "#334155", marginTop: "4px", letterSpacing: "1px" }}>
            {isOverridden
              ? "MANUAL OVERRIDE · TAP TO UNDO"
              : (rest ? "SUN / THU · LOW CARB · NO GYM" : `GYM ${PRESETS[preset].gymTime}`)
            }
          </div>
        </div>
      </div>

      {/* ═══ WORKOUT PRESET SELECTOR ═══ */}
      {!rest && (
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
          {Object.values(PRESETS).map((p) => {
            const active = preset === p.id;
            return (
              <div
                key={p.id}
                className="tap-target"
                onClick={() => selectPreset(p.id)}
                style={{
                  flex: "1 1 0", minWidth: "90px",
                  padding: "10px 12px", borderRadius: "6px",
                  background: active ? "#4ade8018" : "#0d1520",
                  border: `1px solid ${active ? "#4ade8066" : "#1e293b"}`,
                  textAlign: "center",
                  transition: "all 0.2s",
                }}
              >
                <div style={{
                  fontSize: "14px", fontWeight: "bold", letterSpacing: "2px",
                  color: active ? "#4ade80" : "#475569",
                }}>{p.label}</div>
                <div style={{
                  fontSize: "9px", color: active ? "#4ade8099" : "#334155",
                  marginTop: "3px", letterSpacing: "0.5px",
                }}>{p.desc}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* ═══ TIMELINE BAR ═══ */}
      <div style={{ userSelect: "none" }}>
        <div style={{
          position: "relative", height: "38px",
          background: "#0d1520", borderRadius: "4px",
          border: "1px solid #1e293b", overflow: "hidden",
        }}>
          {events.map((ev) => {
            const s = toMin(ev.time);
            const e = toMin(ev.endTime);
            const left  = ((s - DAY_START) / (DAY_END - DAY_START)) * 100;
            const width = ((e - s) / (DAY_END - DAY_START)) * 100;
            const isCurr = currentEvent?.id === ev.id;
            const c = TYPE_COLORS[ev.type] || "#4ade80";
            return (
              <div key={ev.id} style={{
                position: "absolute", left: `${left}%`, width: `${width}%`,
                top: "3px", bottom: "3px",
                background: isCurr ? `${c}30` : `${c}0e`,
                border: `1px solid ${isCurr ? c : c + "44"}`,
                borderRadius: "2px",
                display: "flex", alignItems: "center", justifyContent: "center",
                overflow: "hidden", transition: "background 0.4s",
              }}>
                {width >= 5 && (
                  <span style={{
                    fontSize: "8px", letterSpacing: "0.5px",
                    color: isCurr ? c : c + "99",
                    fontWeight: isCurr ? "bold" : "normal",
                    whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                    padding: "0 3px",
                  }}>{ev.label}</span>
                )}
              </div>
            );
          })}
          {timelinePct >= 0 && timelinePct <= 100 && (
            <div style={{
              position: "absolute", left: `${timelinePct}%`,
              top: 0, bottom: 0, width: "2px",
              background: "#f1f5f9cc", zIndex: 10,
              boxShadow: "0 0 6px #f1f5f944",
            }}>
              <div style={{
                position: "absolute", top: "-1px", left: "50%",
                transform: "translateX(-50%)",
                width: "6px", height: "6px",
                background: "#f1f5f9", borderRadius: "50%",
              }}/>
            </div>
          )}
        </div>
        <div style={{ position: "relative", height: "16px", marginTop: "2px" }}>
          {hourTicks.map(h => {
            const left = ((h * 60 - DAY_START) / (DAY_END - DAY_START)) * 100;
            return (
              <div key={h} style={{
                position: "absolute", left: `${left}%`,
                transform: "translateX(-50%)",
                fontSize: "8px", color: "#334155", letterSpacing: "0.5px",
              }}>{padZ(h)}:00</div>
            );
          })}
        </div>
      </div>

      {/* ═══ MAIN PANELS ═══ */}
      <div style={{ display: "flex", gap: "14px", flex: 1, flexWrap: "wrap" }}>
        {/* Current event */}
        <div style={{
          flex: "1 1 320px", minWidth: "280px",
          background: "#0d1520",
          border: `1px solid ${currentEvent ? (TYPE_COLORS[currentEvent.type] || "#4ade80") + "55" : "#1e293b"}`,
          borderRadius: "6px", padding: "16px 20px",
          display: "flex", flexDirection: "column", gap: "12px",
        }}>
          <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>▶ RIGHT NOW</div>
          {allDone && (
            <div style={{ color: "#475569", fontSize: "15px", lineHeight: "1.6" }}>
              Day complete. Rest up.<br/>
              Prep tomorrow's chicken + pasta if you haven't already.<br/>
              Sleep by 22:30 — GH release peaks in deep sleep.
            </div>
          )}
          {beforeDay && (
            <div>
              <div style={{ fontSize: "18px", color: "#4ade80", fontWeight: "bold" }}>
                {rest ? "Rest day — take it easy" : "Morning — get your 10K steps in"}
              </div>
              <div style={{ fontSize: "12px", color: "#475569", marginTop: "8px", lineHeight: "1.5" }}>
                {rest
                  ? "First meal at 08:30. No gym today — recover and let muscles repair."
                  : preset === "morning"
                    ? "Pre-gym fuel at 06:30. Skip the fasted walk — gym IS the exercise today."
                    : "Fasted walk while insulin is low — peak fat oxidation window. First meal at 08:30."
                }
              </div>
            </div>
          )}
          {!currentEvent && !allDone && !beforeDay && (
            <div>
              <div style={{ fontSize: "16px", color: "#64748b" }}>Between meals</div>
              <div style={{ fontSize: "12px", color: "#334155", marginTop: "6px" }}>
                Stay hydrated — water + High5 Zero electrolyte tablet. Target 4L daily.
              </div>
            </div>
          )}
          {currentEvent && renderEventCard(currentEvent, true, false)}
        </div>

        {/* Next event */}
        <div style={{
          flex: "1 1 320px", minWidth: "280px",
          background: "#0a1020", border: "1px solid #1e293b",
          borderRadius: "6px", padding: "16px 20px",
          display: "flex", flexDirection: "column", gap: "12px",
          opacity: nextEvent ? 1 : 0.35,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>↗ UP NEXT</div>
            {nextEvent && countdownMs !== null && (
              <div style={{
                fontSize: "22px", fontWeight: "bold",
                color: countdownMs < 30 * 60000 ? "#f97316" : "#475569",
                fontVariantNumeric: "tabular-nums", letterSpacing: "-1px",
              }}>{formatCountdown(countdownMs)}</div>
            )}
          </div>
          {!nextEvent && <div style={{ fontSize: "13px", color: "#334155" }}>No more events today.</div>}
          {nextEvent && renderEventCard(nextEvent, false, true)}
        </div>
      </div>

      {/* ═══ FULL SCHEDULE (collapsible) ═══ */}
      <ScheduleList
        events={events}
        currentEvent={currentEvent}
        plenny={plenny}
        togglePlenny={togglePlenny}
        rest={rest}
      />

      {/* ═══ FOOTER ═══ */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        borderTop: "1px solid #0d1520", paddingTop: "8px", flexWrap: "wrap", gap: "6px",
      }}>
        <div style={{ fontSize: "9px", color: "#1e293b", letterSpacing: "2px" }}>
          TARGET · {rest ? "~1400 KCAL · ~173P / ~60C / ~55F" : "~1750 KCAL · ~178P / ~161C / ~46F"} · 4L WATER
        </div>
        <div style={{ fontSize: "9px", color: "#1e293b", letterSpacing: "1px" }}>
          GOAL: 15% BF · ~68 KG
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   SCHEDULE LIST COMPONENT
   ================================================================ */
function ScheduleList({ events, currentEvent, plenny, togglePlenny, rest }) {
  const [expanded, setExpanded] = useState(false);

  return (
    <div style={{
      background: "#0d1520", border: "1px solid #1e293b",
      borderRadius: "6px", overflow: "hidden",
    }}>
      <div
        className="tap-target"
        onClick={() => setExpanded(!expanded)}
        style={{
          padding: "12px 16px",
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}
      >
        <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#334155" }}>
          {rest ? "REST DAY SCHEDULE" : "TODAY'S SCHEDULE"}
        </div>
        <div style={{ fontSize: "12px", color: "#475569" }}>{expanded ? "▲" : "▼"}</div>
      </div>

      {expanded && (
        <div style={{ padding: "0 16px 12px", display: "flex", flexDirection: "column", gap: "6px" }}>
          {events.map((ev) => {
            const c = TYPE_COLORS[ev.type] || "#4ade80";
            const isCurr = currentEvent?.id === ev.id;
            const isSwapped = ev.type === "meal" && plenny[ev.id];
            return (
              <div key={ev.id} style={{
                display: "flex", alignItems: "center", gap: "10px",
                padding: "8px 10px", borderRadius: "4px",
                background: isCurr ? c + "15" : "transparent",
                border: isCurr ? `1px solid ${c}33` : "1px solid transparent",
              }}>
                <div style={{
                  fontSize: "11px", color: isCurr ? c : "#475569",
                  fontVariantNumeric: "tabular-nums", minWidth: "42px",
                  fontWeight: isCurr ? "bold" : "normal",
                }}>{ev.time}</div>
                <div style={{
                  width: "6px", height: "6px", borderRadius: "50%",
                  background: isCurr ? c : c + "66", flexShrink: 0,
                }}/>
                <div style={{
                  flex: 1, fontSize: "12px",
                  color: isCurr ? "#e2e8f0" : "#64748b",
                  fontWeight: isCurr ? "bold" : "normal",
                }}>
                  {isSwapped ? "PLENNY PRO" : ev.label}
                  {ev.tag && !isSwapped && (
                    <span style={{ fontSize: "9px", color: "#334155", marginLeft: "8px" }}>{ev.tag}</span>
                  )}
                </div>
                {ev.type === "meal" && (
                  <div
                    className="tap-target"
                    onClick={(e) => { e.stopPropagation(); togglePlenny(ev.id); }}
                    style={{
                      padding: "4px 8px", borderRadius: "3px",
                      fontSize: "9px", letterSpacing: "0.5px",
                      background: isSwapped ? "#fb923c22" : "#1e293b44",
                      color: isSwapped ? "#fb923c" : "#334155",
                      border: `1px solid ${isSwapped ? "#fb923c44" : "#1e293b"}`,
                    }}
                  >
                    {isSwapped ? "UNDO" : "⚡PP"}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
